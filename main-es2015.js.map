<style>
  body {
    color: #61443e;
    font-family: Monospace;
    font-size: 13px;
    text-align: center;
    margin: 0px;
    overflow: hidden;
  }

  #info {
    position: absolute;
    top: 0px;
    width: 100%;
    padding: 5px;
  }

  a {

    color: #a06851;
  }

  .count {
    position: fixed;
    top: 0;
    left: 0;
  }
</style>
<!-- <span class="count">{{'translate(-50%,'+((-intro+120)*3)+'px)'}}</span> -->
<div id="container"></div>
<div class="white-sheet" [ngStyle]="{'transform':'translate(-50%,'+((-intro+120)*3)+'px)'} "></div>
<div class="harry-container head-back" [ngStyle]="{'transform':'translate(-50%,'+((-intro+120)*3)+'px)'} ">
  <img class="skull-hole" src="https://assets.codepen.io/227435/skull-hole.png" />
</div>
<div id="page-container">
</div>

<div class="harry-container" [ngStyle]="{'transform':'translate(-50%,'+((-intro+120)*3)+'px)'} ">
  <img #eye1 class="eye1" [ngStyle]="{'transform': eyes[0].transform}" src="https://assets.codepen.io/227435/eye.png" />
  <img #eye2 [ngStyle]="{'transform': eyes[1].transform}" class="eye2" src="https://assets.codepen.io/227435/eye.png" />
  <img class="body" src="https://assets.codepen.io/227435/body.png" />
  <img class="hair" src="https://assets.codepen.io/227435/head-top.png" (click)="openHead=!openHead"
    [ngClass]="{'open-head': openHead}" />
  <svg #headCut id="head-cut" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 283.87 33.89">
    <defs>
      <style>
        .cls-1 {
          fill: none;

          stroke-miterlimit: 10;
        }
      </style>
    </defs>

</div>
<svg id="laser" class="laser">
  <defs>
    <filter id="f1" x="0" y="0" width="100%" height="100%">
      <feOffset result="offOut" in="SourceGraphic" dx="0" dy="0" />
